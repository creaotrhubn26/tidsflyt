<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="Excel-timelister vs Tidum">
  <rect width="800" height="460" fill="#f8fafc"/>
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0c4a6e">Excel-timeliste vs. digital tidsregistrering</text>

  <!-- Left column — Excel -->
  <rect x="40" y="80" width="350" height="340" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="80" width="350" height="50" rx="12" fill="#fef2f2"/>
  <rect x="40" y="118" width="350" height="12" fill="#fef2f2"/>
  <text x="215" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#991b1b">Excel / papir</text>

  <g font-family="system-ui, sans-serif" font-size="13" fill="#334155">
    <!-- x marks -->
    <circle cx="70" cy="158" r="9" fill="#fecaca"/>
    <path d="M66 154 l8 8 M74 154 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="162">Flere filer — én per bruker</text>

    <circle cx="70" cy="188" r="9" fill="#fecaca"/>
    <path d="M66 184 l8 8 M74 184 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="192">Ingen godkjenningsflyt</text>

    <circle cx="70" cy="218" r="9" fill="#fecaca"/>
    <path d="M66 214 l8 8 M74 214 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="222">Feil oppdages ved lønn</text>

    <circle cx="70" cy="248" r="9" fill="#fecaca"/>
    <path d="M66 244 l8 8 M74 244 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="252">Ingen versjonshistorikk</text>

    <circle cx="70" cy="278" r="9" fill="#fecaca"/>
    <path d="M66 274 l8 8 M74 274 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="282">Manuell sum av overtid</text>

    <circle cx="70" cy="308" r="9" fill="#fecaca"/>
    <path d="M66 304 l8 8 M74 304 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="312">Rekonstrueres fra minnet</text>

    <circle cx="70" cy="338" r="9" fill="#fecaca"/>
    <path d="M66 334 l8 8 M74 334 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="342">Filer forsvinner</text>

    <circle cx="70" cy="368" r="9" fill="#fecaca"/>
    <path d="M66 364 l8 8 M74 364 l-8 8" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="372">Ingen mobilstøtte i felt</text>
  </g>

  <!-- Right column — Tidum -->
  <rect x="410" y="80" width="350" height="340" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="410" y="80" width="350" height="50" rx="12" fill="#ecfeff"/>
  <rect x="410" y="118" width="350" height="12" fill="#ecfeff"/>
  <text x="585" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">Tidum</text>

  <g font-family="system-ui, sans-serif" font-size="13" fill="#334155">
    <circle cx="440" cy="158" r="9" fill="#86efac"/>
    <path d="M436 158 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="162">Ett sted for hele teamet</text>

    <circle cx="440" cy="188" r="9" fill="#86efac"/>
    <path d="M436 188 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="192">Godkjenning med signatur</text>

    <circle cx="440" cy="218" r="9" fill="#86efac"/>
    <path d="M436 218 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="222">Avvik flagges i sanntid</text>

    <circle cx="440" cy="248" r="9" fill="#86efac"/>
    <path d="M436 248 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="252">Audit-logg per endring</text>

    <circle cx="440" cy="278" r="9" fill="#86efac"/>
    <path d="M436 278 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="282">Overtid regnes automatisk</text>

    <circle cx="440" cy="308" r="9" fill="#86efac"/>
    <path d="M436 308 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="312">Registrert mens jobb pågår</text>

    <circle cx="440" cy="338" r="9" fill="#86efac"/>
    <path d="M436 338 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="342">Sky — ingen filer mistes</text>

    <circle cx="440" cy="368" r="9" fill="#86efac"/>
    <path d="M436 368 l3 3 l6 -7" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="460" y="372">Fungerer på mobil i felt</text>
  </g>

  <text x="400" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Digital tidsregistrering reduserer korreksjonstid med 60–80% i praksis</text>
</svg>
