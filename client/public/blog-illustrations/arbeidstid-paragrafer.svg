<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Viktigste paragrafer i arbeidsmiljøloven om arbeidstid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0c4a6e">Arbeidsmiljøloven kapittel 10 — arbeidstid</text>

  <!-- Card 1: § 10-4 -->
  <rect x="40" y="95" width="230" height="310" rx="14" fill="url(#card)" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="40" y="95" width="230" height="52" rx="14" fill="#0ea5e9"/>
  <rect x="40" y="130" width="230" height="17" fill="#0ea5e9"/>
  <text x="155" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">§ 10-4</text>
  <text x="155" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0c4a6e">Alminnelig arbeidstid</text>
  <line x1="70" y1="200" x2="240" y2="200" stroke="#bae6fd" stroke-width="1"/>
  <text x="155" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#0ea5e9">9</text>
  <text x="155" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">timer per dag</text>
  <text x="155" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#0ea5e9">40</text>
  <text x="155" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">timer per uke</text>
  <text x="155" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">gjennomsnitt over</text>
  <text x="155" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">inntil 52 uker</text>

  <!-- Card 2: § 10-6 -->
  <rect x="285" y="95" width="230" height="310" rx="14" fill="url(#card)" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="285" y="95" width="230" height="52" rx="14" fill="#0ea5e9"/>
  <rect x="285" y="130" width="230" height="17" fill="#0ea5e9"/>
  <text x="400" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">§ 10-6</text>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0c4a6e">Overtid</text>
  <line x1="315" y1="200" x2="485" y2="200" stroke="#bae6fd" stroke-width="1"/>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#0ea5e9">10</text>
  <text x="400" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">timer per 7 dager</text>
  <text x="400" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#0ea5e9">200</text>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">timer per 52 uker</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">krever særlig og</text>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">tidsavgrenset behov</text>

  <!-- Card 3: § 10-7 -->
  <rect x="530" y="95" width="230" height="310" rx="14" fill="url(#card)" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="530" y="95" width="230" height="52" rx="14" fill="#0284c7"/>
  <rect x="530" y="130" width="230" height="17" fill="#0284c7"/>
  <text x="645" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">§ 10-7</text>
  <text x="645" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0c4a6e">Dokumentasjonsplikt</text>
  <line x1="560" y1="200" x2="730" y2="200" stroke="#bae6fd" stroke-width="1"/>
  <!-- checklist -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#334155">
    <circle cx="570" cy="225" r="7" fill="#10b981"/>
    <path d="M567 225 l3 3 l5 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="585" y="229">start- og sluttid</text>
    <circle cx="570" cy="253" r="7" fill="#10b981"/>
    <path d="M567 253 l3 3 l5 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="585" y="257">pauser</text>
    <circle cx="570" cy="281" r="7" fill="#10b981"/>
    <path d="M567 281 l3 3 l5 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="585" y="285">overtid</text>
    <circle cx="570" cy="309" r="7" fill="#10b981"/>
    <path d="M567 309 l3 3 l5 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="585" y="313">ekstra vakter</text>
    <circle cx="570" cy="337" r="7" fill="#10b981"/>
    <path d="M567 337 l3 3 l5 -6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="585" y="341">bytter</text>
  </g>
  <text x="645" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">tilgjengelig for</text>
  <text x="645" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Arbeidstilsynet</text>

  <text x="400" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Kilde: Lovdata — Lov om arbeidsmiljø (aml.) kapittel 10</text>
</svg>
