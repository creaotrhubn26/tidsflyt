<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Hva må registreres etter arbeidsmiljøloven">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg2)"/>
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0c4a6e">Hva må registreres — og hvorfor</text>

  <!-- Timeline bar -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="640" height="56" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="56" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="320" y1="0" x2="320" y2="56" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="440" y1="0" x2="440" y2="56" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="570" y1="0" x2="570" y2="56" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Worked time block -->
    <rect x="4" y="6" width="152" height="44" rx="4" fill="#0ea5e9"/>
    <text x="80" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Arbeid 08:00–11:30</text>

    <!-- Break -->
    <rect x="164" y="6" width="152" height="44" rx="4" fill="#fbbf24"/>
    <text x="240" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#78350f">Pause 11:30–12:00</text>

    <!-- Worked -->
    <rect x="324" y="6" width="112" height="44" rx="4" fill="#0ea5e9"/>
    <text x="380" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Arbeid 12:00–16:00</text>

    <!-- Overtime -->
    <rect x="444" y="6" width="122" height="44" rx="4" fill="#ef4444"/>
    <text x="505" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Overtid 16:00–18:00</text>

    <!-- Travel -->
    <rect x="574" y="6" width="62" height="44" rx="4" fill="#a78bfa"/>
    <text x="605" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Reise</text>
  </g>

  <!-- Labels below bar -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#64748b">
    <text x="160" y="180">08:00</text>
    <text x="320" y="180">12:00</text>
    <text x="480" y="180">16:00</text>
    <text x="630" y="180">18:00</text>
  </g>

  <!-- Legend cards -->
  <g transform="translate(60, 220)">
    <!-- 1 -->
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="4" height="100" fill="#0ea5e9"/>
    <text x="18" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Arbeidstid</text>
    <text x="18" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Når ansatt er til</text>
    <text x="18" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#475569">disposisjon og utfører</text>
    <text x="18" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#475569">arbeid for arbeidsgiver.</text>

    <!-- 2 -->
    <rect x="240" y="0" width="220" height="100" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="240" y="0" width="4" height="100" fill="#fbbf24"/>
    <text x="258" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Pauser</text>
    <text x="258" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Over 5 ½ timer gir rett</text>
    <text x="258" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#475569">til pause — må markeres</text>
    <text x="258" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#475569">hvis trukket fra.</text>

    <!-- 3 -->
    <rect x="480" y="0" width="220" height="100" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="480" y="0" width="4" height="100" fill="#ef4444"/>
    <text x="498" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Overtid</text>
    <text x="498" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Må skilles ut særskilt</text>
    <text x="498" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#475569">og registreres løpende.</text>
    <text x="498" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Tillegg etter avtale.</text>
  </g>

  <g transform="translate(60, 340)">
    <!-- 4 -->
    <rect x="0" y="0" width="340" height="100" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="0" y="0" width="4" height="100" fill="#a78bfa"/>
    <text x="18" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Reise- og ventetid</text>
    <text x="18" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Pålagt reise i arbeidstid regnes som arbeidstid.</text>
    <text x="18" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Ventetid med plikt til å stille opp også.</text>

    <!-- 5 -->
    <rect x="360" y="0" width="340" height="100" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="360" y="0" width="4" height="100" fill="#10b981"/>
    <text x="378" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Godkjenning</text>
    <text x="378" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Leder eller tiltaksleder attesterer timer.</text>
    <text x="378" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Spor av hvem og når må finnes i systemet.</text>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Basert på aml. § 10-1, § 10-7 og § 10-9 — Arbeidstilsynets veileder</text>
</svg>
