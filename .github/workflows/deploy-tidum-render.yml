name: Deploy Tidum Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tidum-render-production
  cancel-in-progress: true

jobs:
  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deploy on Render
        env:
          RENDER_API_KEY: ${{ secrets.TIDUM_RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d79heff5r7bs73frlj7g
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "TIDUM_RENDER_API_KEY is missing"
            exit 1
          fi

          response="$(curl -sS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{"clearCache":"do_not_clear"}')"

          echo "$response"
          echo "$response" | grep '"id"' >/dev/null
