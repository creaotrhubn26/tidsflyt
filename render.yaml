services:
  - type: web
    name: tidum-backend
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: CF_TURNSTILE_SECRET_KEY
        sync: false
      - key: VITE_CF_TURNSTILE_SITE_KEY
        sync: false
      - key: CREATORHUB_SYNC_WEBHOOK_URL
        sync: false
      - key: TIDUM_CREATORHUB_SYNC_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_REPLY_TO
        sync: false
      - key: MANAGER_EMAIL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DEFAULT_GA4_MEASUREMENT_ID
        value: G-LTGH4LNPE3
      - key: DEFAULT_GA4_STREAM_ID
        value: "14316357971"
      - key: DEFAULT_GTM_CONTAINER_ID
        value: GTM-55SPZGMD
      - key: DEFAULT_ENABLE_ANALYTICS
        value: "true"
      - key: POWEROFFICE_ENV
        value: demo
      - key: POWEROFFICE_AUTH_URL
        value: https://goapi.poweroffice.net/Demo/OAuth/Token
      - key: POWEROFFICE_BASE_URL
        value: https://goapi.poweroffice.net/demo/v2
      - key: POWEROFFICE_APPLICATION_KEY
        sync: false
      - key: POWEROFFICE_CLIENT_KEY
        sync: false
      - key: POWEROFFICE_SUBSCRIPTION_KEY
        sync: false
      - key: POWEROFFICE_SUBSCRIPTION_KEY_SECONDARY
        sync: false
      - key: VEGVESEN_API_KEY
        sync: false
      - key: OSRM_BASE_URL
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: ORS_BASE_URL
        sync: false
      - key: MILEAGE_RATE_PER_KM
        sync: false
      - key: MILEAGE_PASSENGER_RATE_PER_KM
        sync: false
